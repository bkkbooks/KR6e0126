正覺作是事已右繞衆會入如來性起妙德菩薩頂時妙德菩薩合掌一心向佛説偈以十偈讚佛功德爾時如來即於口中放大光明名無礙無畏百千億阿僧祇光明以為眷屬普照十方虗空法界一切世界右繞十匝顯示如來種種自在開悟無量諸菩薩衆乃至如來坐菩提座成等正覺作是事已入普賢菩薩口其光入已普賢菩薩身座過於本時及諸菩薩身座百倍除如來師子之座爾時如來性起妙德菩薩問普賢言佛子佛所示現廣大神變令諸菩薩皆生歡喜不可思議世莫能知是何瑞相普賢菩薩言佛子如來示現廣大神變即説如來出現法門出生無量問法光明時性起妙德菩薩問普賢菩薩云何知諸佛如來應正等覺出現之法身相言音三昧成道轉法輪乃至入般涅槃見聞親近所生善根如是等事又向普賢菩薩而説頌言重敘前法爾時普賢菩薩告性起妙德菩薩言佛子此處不可思議如來應正等覺以無量法而得出現何以故非以一緣非以一事如來出現而得成就以十無量百千億阿僧祗事而得成就所謂過去佛所聽聞受持大法雲雨因此能起來如四種大智風輪一者念持不忘陀羅尼大智風輪能持如來大法雲雨二者出生止觀大智風輪能消竭一切煩惱故三者善巧回向大智風輪能成就一切善根故四者出生離垢差別莊嚴大智風輪令過去所化一切衆生善根清淨成就如來無漏善根力故如來如是成等正覺法性如是無生無作而得成就佛子是為如來應正等覺出現第一相略表一相以況後十種出現之相又以三十七偈重敘其中功德普賢菩薩告諸菩薩言如來應正等覺有十種無量身復有十種無量音聲復有十種無量心復有十種無量所行之行復有十種無量成正覺復有十種無量入涅槃復有十種無量親近此上八十種如來出現無量法門功德行願説是法時十方各有十不可説百千億那由他世界六種震動乃至周遍十方世界悉亦如是是時十方各過八十不可説百千億那由他佛剎微塵數世界外各有八十不可説百千億那由他佛剎微塵數如來同名普賢皆現其前而作是言善哉佛子乃能承佛威力隨順法性演説如來出現不思議法説是法時於此會中十萬佛剎微塵數菩薩得一切菩薩神通三昧佛所授記一生當得阿耨多羅三藐三菩提佛剎微塵數衆生皆發菩提之心此上如來出現品中廣大行願廣大威神如經自具此如來出現品為平等果八會菩提場中三會普光明殿説離世間品者表如來世尊在摩竭提國菩提場中普光明殿坐蓮華藏師子之座與不可説百千億那由他佛剎微塵數諸菩薩俱一生當得阿耨多羅三藐三菩提各從他方種種國土而來集會其名曰普賢菩薩普眼菩薩等十普菩薩如是等十不可説百千億那由他佛剎微塵數菩薩皆悉成就普賢行願爾時普賢菩薩入廣大三昧名佛華莊嚴入此三昧時十方所有一切世界六種十八相動出大音聲靡不皆聞從三昧起爾時普慧菩薩知衆已集問普賢菩薩言佛子何等為菩薩依何等為奇特想何等行何等善知識何等勤精進何等心得安隱何等為成就衆生何等為戒何等自知受記何等入菩薩地何等入如來何等入衆生心行何等為入世界何等為入劫住何等為説三世何等為知三世何等為坐道場乃至何等轉法輪何故如來應正等覺示般涅槃善哉佛子願為我説此上總有二百問之法門普賢菩薩一種中以十種答總有二千答之法門若能授持當知是人疾得阿耨多羅三藐三菩提説此品時十方無量無邊阿僧祗世界皆大震動大光普照十方諸佛皆現於普賢菩薩前讚言善哉善哉善男子乃能説此諸菩薩摩訶薩功德行處決定義華普入一切佛法出世間法門品我等諸佛悉共同心護持此經令現在未來諸菩薩衆未曾聞者皆當得聞爾時普賢菩薩摩訶薩承佛神力觀察十方一切大衆暨於法界而説頌言又以二百首偈頌重敘此品功德如經自具此離世間品為成行因果周為行分九會逝多林入法界品者表世尊在室羅筏國逝多林給孤獨園大莊嚴重閣與菩薩摩訶薩五百人俱普賢文殊而為上首𦦨光幢菩薩法界光明菩薩等皆悉成就普賢行願境界故及與五百聲聞衆俱又與無量諸世間主俱悉曾供養無量諸佛時諸菩薩大德聲聞世間諸王並其眷屬咸作是念云何是如來境界如來智行如來加持如來力如來無畏如來三昧如來自在如來身如來智一切世間諸天及人無能通達無能趣入無能宣明無有能令衆生解了唯除如來加被之力唯願世尊隨順我等及諸衆生種種欲解種種自在種種智慧乃至種種聽受諸所説法顯示如來往昔趣求一切智心如是等法願皆為説爾時世尊知諸菩薩心之所念大悲為身大悲為門而為方便充滿虗空爾時世尊入師子頻伸三昧入三昧已一切世間普皆嚴淨於時此大莊嚴重閣忽然廣博無有邊際無邊境界咸放光明普周法界與不可説佛剎微塵數諸佛世界其量正等不可説寶遍布其地時逝多林上虗空之中有不可思議天宮殿雲妓樂歌讚一切供具遍滿虗空充塞法界爾時十方過不可説佛剎微塵數世界外如是十方一一各有不可説佛剎微塵數菩薩來詣佛所如是菩薩各各統領不可説佛剎微塵數菩薩來詣佛所各各現一切諸供養具諸莊嚴具供養世尊遍周法界充滿虗空隨其來方各各化作寶蓮華師子之座與其眷屬結跏趺坐如是十方一切菩薩並其眷屬皆從普賢菩薩行願中生以淨智眼見三世佛普聞一切諸佛如來所轉法輪修多羅海已得至一切菩薩自在彼岸如是菩薩滿逝多林皆是如來威神之力爾時毗盧遮那願光明菩薩等十首菩薩一一各以十偈讚歎如來功德行願共有百偈重敘如來於此逝多林中廣大神變爾時世尊欲令諸菩薩安住如來師子頻伸廣大三昧從眉間白毫相中放大光明其光名普照三世法界門以不可説佛剎微塵數光明而為眷屬普照十方一切世界海諸佛國土時逝多林菩薩大衆悉見一切盡法界虗空界一切佛剎一一塵中各有一切佛剎微塵數諸佛國土種種名種種色種種清淨住處形相其中皆有大菩薩坐於道場師子座上成等正覺爾時文殊師利與普賢菩薩各以十偈重敘逝多林中諸神變事爾時文殊師利菩薩從樓閣出與無量同行菩薩及諸天神王八部等衆出自住處來詣佛所右繞世尊經無量匝以諸供具種種供養供養畢已辭退南行往於人間爾時尊者舍利弗等六千比丘及諸菩薩次第南行經歷人間至福城東住莊嚴娑羅林中大塔廟處時文殊師利與其眷屬到此處已即於其處説普照法界修多羅百萬億那由他修多羅以為眷屬説此經時大海中有無量百千億那由他諸龍王等聞此法已深厭龍趣正求佛道咸捨龍身生天人中一萬諸龍於阿耨多羅三藐三菩提得不退轉復有無量衆生於三乘中各得調伏時福城人聞文殊師利童子在莊嚴幢婆羅林中大塔廟處無量大衆從其城出來詣其所時有優婆塞名曰大智與五百優婆塞來詣文殊師利所復有五百優婆夷大慧為首與其眷屬來詣其所復有五百童子善財為首與其眷屬來詣其所復有五百童女普賢為首與其眷屬來詣其所各各向文殊師利童子頂禮其足右繞三匝退坐一面爾時文殊師利童子知福城人悉以來集隨其心樂現自在身將為説法復於是時觀察善財以何因緣而有其名知此童子初生之時於其宅內自然而出七寶樓閣樓閣之下有七伏藏於其座上自然開裂生於五百寶器種種諸物無量衆寶盈滿其器父母親屬及善相師共呼此兒名曰善財知此童子已曾供養過去無邊諸佛深種善根信解廣大常樂親近諸善知識淨菩薩道求一切智成佛法器文殊師利為説種種法要令善財童子心開意解發菩提心得大辨才又以三十四首偈頌重敘前法爾時文殊師利菩薩回觀善財童子作如是言汝以發阿耨多羅三藐三菩提心復欲親近諸善知識問菩薩行修菩薩道善男子親近供養諸善知識具一切智最初因緣是故於此勿生疲厭善財白言唯願聖者廣為我説應云何學菩薩行修菩薩道乃至云何令普賢行速得圓滿爾時文殊師利又以十偈歎善財德令善財童子精勤勇猛親近善知識修菩薩道學菩薩行功德行願爾時文殊師利菩薩告善財言於此南方有一國土名為勝樂其國有山名曰妙峯於彼山中有一比丘名曰德雲汝可往問云何學菩薩行云何修菩薩道云何於普賢行疾得圓滿德雲比丘當為汝説爾時善財童子聞是語已歡喜踊躍頂禮其足繞無數匝殷勤瞻仰悲泣流淚辭退南行向勝樂國妙峯山而去親近第一善知識問道行法如是一一親近五十三位大善知識請問我已先發阿耨多羅三藐三菩提心云何學菩薩行云何修菩薩道乃至云何速得圓滿普賢之行如是五十三位大善知識一一各將自己功行願力證道法門神通三昧為善財童子如是而説所以善財童子一一親近諸善知識得證五十三位等地法門所以首善知識文殊師利菩薩主根本智從根本不動智心而起十種信心信心堅固起功進修十住十行十回向十地以此四十種加行之功而為進修之行又以十一地等覺位圓滿功行於此五重為進修之因於後五十位善知識各有證道之位為果德雲比丘起至慈行童女此十善知識主十住法門又善見比丘起至出家遍行外道此十善知識主十行法門又鬻香長者起至菩提場安住神此十善知識主十回向法門又婆珊婆演底夜神起至瞿波女此十善知識主十地法門又摩耶夫人起至德生童子有德童女此十善知識主十大三昧以上五十位善知識為證道之果故謂之為五十重因五十重果合之為百人根本不動智起十種信心謂之為十重因果為一百一十城因果善財童子末後復親近文殊師利菩薩一切功行圓滿仍歸根本不動種智親近普賢菩薩萬行之功亦皆圓滿成普賢行親近彌勒菩薩主功行圓滿成佛之果如是五十三種法門一一親證一主成佛以此法門令一切世間大心衆生以作修道證果之進修功行榜樣者也此入法界品為證入因果周此品為證分光緒乙巳四月八日集成於淨業禪室釋永光敬録并書
