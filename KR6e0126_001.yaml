body:
  text: 夫大方廣佛華嚴經者諸佛之性海一真之法界顯玄微之妙詮演無盡之宗趣語其廣大則無所不包語其精密則無所不備雖一路一門之可入而千殊萬變之無窮望之者莫測其津即之者莫睨其際所謂會滄海而為墨聚須彌而為筆不能盡一句之義而況以淺近之觀卑不之識而欲探其閫奧者哉若無頭緒條則何由貫通旨趣初會菩提場我佛世尊始成正覺現遮那之妙體遍法界以為身顯依正之莊嚴等太虗而共量者標四十種莊嚴品類一一各具無量無邊十佛剎微塵數菩薩所共圍繞又四十類神天部衆一一各統眷屬無數無量無邊無等海衆雲集慶賀法王始成正覺總有四百二十首偈頌讚佛功德難思願海一一各顯證道法門總計四百名目菩薩神天為世間主依報莊飾故稱妙嚴此品建初是為第一如來現相品者表世尊即於面門衆齒之間放佛剎微塵數光明一一復有佛剎微塵數光明以為眷屬於光明中顯現無邊剎土無邊諸佛無邊菩薩覺悟一切世界中一切衆生發菩提心生如來家又放眉間白毫光明普照十方無邊剎土顯現無邊莊嚴無邊菩薩於光明中俱時出現又復於世尊前出大蓮華具無盡莊嚴衆寶成就諸菩薩衆各坐其上各以偈頌讚佛功德普賢三昧品者表普賢菩薩於如來前坐蓮華藏師子之座入一切諸佛毗盧遮那如來藏身三昧能於十方無邊佛剎微塵數世界一切諸佛如來前現身説法轉妙法輪世界成就品者表普賢菩薩遍觀一切世界海一切衆海一切諸佛海一切法界海一切衆生業海根欲海如來世尊以十種智知諸菩薩及諸衆生教化成就饒益衆生入佛境界又表世界海各各莊嚴各各依住各各形狀各各趣入各各光明各各體相各各劫住各各差別一一形狀各各俱有十不可説佛剎微塵數名相等俱華藏世界品者表此最中央香水海名無邊妙華光出大蓮華名蘂香幢華藏世界海住在其中有十不可説佛剎微塵數香水海周匝圍繞有十不可説世界種安住其中於內芬陀利華寶尸羅幢樓閣鈴網城廓林樹墻栴檀一一各具不可説百千億那由他周遍嚴飾一一香水海各有四天下微塵數香水河右旋圍繞一一河各有十不可説微塵數莊嚴體量形狀一一各有十不可説俱在此華藏莊嚴世界海中分布而住此中央香水海中有十不可説佛剎微塵數世界於中布列一香水海中安住二十重世界種最下第一重世界種有一佛剎微塵數世界周匝圍繞第二重世界種有二佛剎微塵數世界周匝圍繞重重加增如第二十重世界種有二十佛剎微塵數世界周匝圍繞此為第一個二十重又十個二十重圍繞第一個二十重又一百個二十重圍繞此十一個二十重廣説有十不可説二十重連接安布俱如經説毗盧遮那品者表過去古佛以況今佛有香水海名清淨光有世界名勝音於世界中有一大林名摩尼華枝輪種種莊嚴數無盡極寬廣無量有一大林城人王所都有百萬億那由他城周匝圍繞城中居人靡不成就業報神足乘空往來行同諸天此寶華枝輪大林之中有一道場名寶華遍照以衆大寶分布莊嚴周遍十方其道場前有一大海名香摩尼金剛出大蓮華名華蘂𦦨輪其華廣大百萬由旬莖葉鬚臺皆是妙寶十不可説百千億那由他蓮華所共圍繞此勝音世界最初劫中有十須彌山微塵數如來出興於世其第一佛名一切功德山須彌勝雲於其道場大蓮華中忽然出現其身周普等真法界一切佛剎皆示出生一切道場悉詣其所其勝音世界有六十八千億須彌山頂一一現身而坐即於眉間放大光明十佛剎微塵數光明以為眷屬充滿一切十方國土所有衆生遇斯光者即自開悟彼𦦨光明大城有王名喜見善慧統領百萬億那由他城人王太子夫人彩女等喜見善慧王太子五百人大威光為首十千夫人妙見為首六萬大臣慧力為首如是等七十七百千億那由他衆同往見佛即時證得十種法門諸供養具遍滿虗空至於佛所修敬已畢卻坐一面時彼如來為欲調伏諸衆生故於衆會道場説普集一切三世佛自在法修多羅世界海修多羅以為眷屬隨衆生心悉令獲益時勝雲佛住世五十億歲佛滅度後如是第二佛第三佛第四佛相繼出世王即太子諸臣人民次第親近獲益證道成大菩薩此段經文表引古佛以證今佛毗盧遮那如來出世之法古今相襲古今不異以上從世主妙嚴品至此共六品經文始終為菩提場中表莊嚴表菩薩神天八部諸天龍王人王世間主總都一大會之中古佛今佛成道説法儀式之大慨一終又此四分之一分為之信分一終又五周之一周為所信因果周一終閲經至此可知次緒者也佛名號品者表二會世尊於普光明殿坐寶蓮華藏師子之座現大神力感通法界當會菩提場中十佛剎微塵數菩薩興三十二種問法因緣欲令發菩提心者使知諸佛如來廣大行願又以名號顯發數量等周法界於此娑婆世界四天下種種名號各別不同又於十方世界一方之中有十千名各別不同又於此娑婆世界有百億四天下如來於彼有百萬億種種名號令諸衆生各別知見又於此娑婆世界外東西南北四維上下如是十方一方之中有百萬億種種名號令諸衆生各別知見如經廣説盡虗空遍法界諸世界中有不可數不可量不可思不可議及不可説不可説數無盡極令諸衆生各別知見如經自具四聖諦品者表此娑婆世界中説四種聖諦一種首標十種名四種首標四十種名各各不同於此世界中廣説有四百億十千名隨諸衆生悉令調伏如是十方世界中一一各有四百億十千名如是十方盡虗空遍法界所有世界一一世界中説四聖諦亦各有四百億十千名隨衆生心悉令調伏如上經文總説十方無邊世界無盡名目皆是四聖諦為體從此四聖諦上分作種種法門五蘊十二緣總在其中八萬四千塵勞解脫亦在其內廣如經説光明覺品者表世尊從兩足輪下放百億光明照此三千大千世界百億閻浮提百億弗婆提百億瞿耶尼百億鬱單越百億大海百億輪圍山百億菩薩受生百億菩薩出家百億如來成正覺百億如來轉法輪百億如來入涅槃百億須彌山百億四天王百億三十三天乃至百億色究竟天其中所有悉皆明現如此處見佛世尊坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞其百億閻浮提中百億如來亦如是坐悉以佛神力故十方各不一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其名曰文殊師利十首菩薩等其所來國金色世界等其所事佛不動智佛等爾時一切處文殊師利各於佛所同時發聲而説頌言又以十偈讚佛十種之法令信心者開發覺性信自己是不動智佛爾時光明過此世界遍照東方十佛國土南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現光過十世界遍照東方百世界四維上下亦復如是光過百世界遍照東方千世界四維上下亦復如是光過千世界遍照東方十千世界光過十千世界遍照東方百千世界光過百千世界遍照東方百萬世界四維上下亦復如是乃至光明過十億世界遍照東方百億世界百千億世界那由他百那由他千那由他百千那由他世界一一南西北方四維上下亦復如是如是無數無量無邊無等不可數不可稱不可思不可量不可説盡法界虗空界所有世界南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天悉皆明現彼一一閻浮提中悉見如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩文殊師利等所從來國金色世界等本所事佛不動智佛等一切處文殊師利菩薩各於佛所同時發聲説頌讚佛令起信心者發信進修此十信位中置一百四十種大願成大悲行法身慧身智身一時俱進成十信門如經具明問明品者表文殊師利問覺首菩薩及十首菩薩等佛子心性是一云何見有種種差別所謂往善趣惡趣諸根滿缺受生同異端正醜陋苦樂不同業不知心心不知業受不知報報不知受心不知受受不知心因不知緣緣不知因智不知境境不知智覺首菩薩以偈答曰仁今問是義為曉悟羣生我如其性答唯仁應諦聽諸法無作用亦無有體性是故彼一切各各不相知譬如河中水滿流競奔逝各各不相知諸法亦如是亦如大火聚猛能同時發各各不相知諸法亦如是其所答法總有十偈以答問法如經自具又文殊師利菩薩問財首寶首德首目首勤首法首賢首精進首如是十首菩薩各以十偈答文殊師利其所答法偈頌不録總有百問亦以百答如經自具淨行品者表文殊師利菩薩告智首菩薩言佛子汝今為欲多所饒益多所安隱哀愍世間利樂天人問如是義若諸菩薩善用其心則獲一切勝妙功德於諸佛法心無所礙住去來今諸佛之道隨衆生住恆不捨離如諸法相悉能通達斷一切惡具足衆善當如普賢色相第一一切行願皆得具足於一切法無不自在而為衆生第二導師云何用心能獲一切勝妙功德佛子菩薩在家當願衆生知家性空免其過迫孝事父母當願衆生善事於佛護養一切妻子集會當願衆生怨親平等永離貪著詣大小師當願衆生巧事師長習行善法乃至若得見佛當願衆生得無礙眼見一切佛其餘總有一百四十種大願用成十信位中修行之心雖是有為之心亦能成後五位之內理智大悲之海已後入位萬行之海皆由此一百四十種大願勝上緣力之所能成矣賢首品者表文殊師利菩薩説無濁亂清淨行大功德已欲顯示菩提心功德故以偈問賢首菩薩曰我今以為諸菩薩説佛往修清淨行仁當亦如此會中演暢修行勝功德爾時賢首菩薩以偈答曰善哉仁者應諦聽彼諸功德不可量我今隨力説少分猶如大海一滴水若有菩薩初發心誓求當證佛菩提彼之功德無邊際不可稱量無與等何況無量無邊劫具修地度諸功德十方一切諸如來悉共稱揚無能盡如是無邊大功德我今於中説少分譬如鳥足所履空亦如大地一微塵此上四偈明發心功德廣大難量隨力少説分為明菩提心不可以邊際量故功德還當如是以下總有三百七十二首偈頌其中大意總歎發菩提者之信心令其堅固修習無諸放逸者也又此第二會普光明殿説十信法門共六品經始終一周又三會須彌山頂帝釋宮中名忉利天會升須彌山頂品者表如來威神力故十方一切世界一一四天下閻浮提中悉見如來坐於樹下各有菩薩承佛神力而演説法靡不自謂恆對於佛爾時世尊不離一切處菩提樹下而升須彌向帝釋殿時天帝釋在妙勝殿前遙見佛來即以神力莊嚴此殿置普光明藏師子之座其座悉以妙寶所成十千層級十千金網種種莊嚴十千太子十千梵王前後圍繞十千光明而為照曜爾時帝釋奉為如來敷置座已曲躬合掌恭敬向佛唯願哀愍處此宮殿即時世尊入妙勝殿十方一切世界中悉亦如是又以十偈讚佛功德行願如經自具須彌山上偈讚品者表佛神力故十方各有一大菩薩一一各與十佛剎微塵數菩薩俱從百佛剎微塵數國土外諸世界中而來集會其名曰法慧菩薩一切慧菩薩等所從來國因陀羅網世界等其所事佛殊特月佛等是諸菩薩至佛所已頂禮佛足隨所來方各化作毗盧遮那藏師子之座結跏趺坐十方一切世界悉亦如是爾時世尊從兩足指放百千億妙色光明普照十方一切世界須彌頂上帝釋宮中佛及大衆靡不皆現爾時法慧菩薩承佛神力普觀十方而説頌言如是十慧菩薩各以十偈讚佛功德行願如經自具總有一百首偈頌歎無相為真實合會十住位法令身心諸計皆無所依離於偏執住佛所住偈頌未録如經自具十住品者表法慧菩薩承佛威力入菩薩無量方便三昧以三昧力十方各千佛剎微塵數世界之外有千佛剎微塵數諸菩薩皆同一號名曰法慧普現其前告法慧菩薩言汝能入是三昧善男子十方各千佛剎微塵數諸佛悉以神力共加於汝又是毗盧遮那如來往昔願力威神之力及汝所修善根力故令汝説法為增長佛智故法慧菩薩從定起時告諸菩薩佛子菩薩住有十種過現未來諸佛已説當説今説何等為十所謂初發心住治地住修行住生貴住具足方便住正心住不退住童真住法王子住灌頂住是名菩薩十住二世諸佛所説十住法內功行法則如經自具梵行品者表正念天子白法慧菩薩言佛子一切世界諸菩薩衆依如來教染衣出家云何而得梵行清淨從菩薩位逮於無上菩提之道法慧菩薩言佛子菩薩修梵行時應以十法而為所緣作意觀察所謂身身業語語業意意業佛法僧戒應如是觀身是梵行耶乃至戒是梵行耶若是梵行當知梵行則為非善則為非法則為渾濁則為臭惡則為不淨三業六根五蘊十二緣十八界六通三明慈悲喜捨四無量心六波羅蜜於諸法中不生二解一切佛法疾得現前初發心時即得阿耨多羅三藐三菩提知一切法即心自性成就慧身不由他悟故於中辨通十法諸義名言如經自具初發心功德品者表天帝釋白法慧菩薩言佛子菩薩初發菩提之心所得功德其量幾何法慧菩薩言此義甚深難説難知難分別難信解難證難行難通達難度量難趣入雖然我當承佛威力而為汝説佛子假使有人以一切樂具供養東方阿僧祗世界所有衆生經於一劫然後教令淨持五戒南西北方四維上下亦復如是經於一劫如是功德寧為多不天帝釋言此人功德比菩薩初發心功德百分千分乃至算數譬喻所不能及其中所説譬喻條則廣多難可窮盡數在經中閲經可知廣明發心功德難量如經自具明法品者表精進慧菩薩白法慧菩薩言佛子菩薩初發求一切智心成就無量功德具大莊嚴升一切智乘入菩薩正位捨諸世間法得出世間法三世諸佛攝受決定至於無上菩提之處爾時法慧菩薩告精進慧菩薩善哉佛子汝今為欲多所饒益多所安樂多所惠利哀愍世間問如是法佛子菩薩住十種不放逸法得十種清淨法經中廣多明文如經自具總以堅守淨戒精修密行廣度衆生成就智力三世諸佛同一體性清淨心故此上三會從須彌頂上帝釋天宮表須彌山頂品表偈讚品表十位品表梵行品表初發心功德品表明法品此六品經是第三會始終一周而為解分為差別因果周之內閲經至此可知次序第四會升夜摩天宮品者表如來威神力故不離一切菩提樹下及須彌山頂而向於彼夜摩天宮寶莊嚴殿時夜摩天王遙見佛來即以神力於其殿內化作寶蓮華藏師子之座百萬層級以為莊嚴百萬金網以為交絡種種莊嚴數各百萬乃至光明而為照耀百萬夜摩天王恭敬頂禮百萬梵王百萬菩薩讚佛功德爾時天王説偈讚佛皆以十偈表歎功德如此世界中夜摩天王承佛神力稱揚讚歎十方一切世界夜摩天王悉亦如是夜摩天宮偈讚品者表佛神力故十方各有一大菩薩一一各與佛剎微塵數菩薩俱從十萬佛剎微塵數國土外諸世界中而來集會其名曰功德林菩薩等所從來國親慧世界等各於佛所淨修梵行其所事佛常住眼佛等是諸菩薩至佛所已頂禮其足隨所來方化作摩尼藏師子之座結跏趺坐如此世界夜摩天王菩薩來集十方一切世界悉亦如是爾時功德林菩薩以偈頌言佛放大光明普照於十方悉見天人尊通達無障礙等如是十林菩薩各以十偈讚佛功德行願利益羣生得菩提道共成百偈如經自具十行品者表功德林菩薩承佛神力入菩薩善思惟三昧入是三昧已十方各過萬佛剎微塵數世界外有萬佛剎微塵數諸佛皆號功德林而現其前告功德林菩薩言佛子乃能入此三昧此是十方諸佛共加於汝亦是如來往昔願力及諸菩薩衆善根力令汝入是三昧而演説法是時諸佛即與十種智又各伸右手摩功德林菩薩頂功德林即從定起告諸菩薩言佛子菩薩行不可思議與法界虗空界等有十種行三世諸佛之所宣説何等為十一者歡喜行二者饒益行三者無違逆行四者無屈撓行五者無癡亂行六者善現行七者無著行八者難得行九者善法行十者真實行如是十行之法功用條則一行之內各有譬喻修行之功利益衆生説是法時十方世界六種震動如此世界夜摩天宮説十行法所現神變十方世界悉以如是又十林菩薩各以十偈重敘十行之內功德行願如經自具共成百偈十無盡藏品者表功德林菩薩告諸菩薩言佛子菩薩摩訶薩有十種藏過去未來現在諸佛已説當説今説何等為十所謂信藏戒藏愧藏慙藏施藏慧藏念藏持藏辨藏是為十此十種藏菩薩修行功用願力令諸菩薩究竟成就無上菩提亦令一切世間所作悉皆究竟無盡大藏此上夜摩天宮品偈讚品十行品十無盡藏品始終四會一周第五兜率天宮會升兜率天宮品者表佛神力故不離一切處菩提樹下及須彌頂夜摩天而往兜率天宮一切妙寶所莊嚴殿時兜率天王遙見佛來於其殿上敷摩尼藏師子之座天諸妙寶之所集成如來神力所現無量百千億那由他阿僧祗善根所生於其殿內種種莊嚴一一各具百萬億種種供養總有一百八十四箇百萬億又有一百零八箇百萬億菩薩及諸天神王八部等一一均各百萬億數之衆恭敬供養前後圍繞爾時世尊於其殿內升摩尼藏師子坐上結跏趺坐爾時佛神力故十方各有一大菩薩一一各與萬佛剎微塵數諸菩薩俱來詣佛所其名曰金剛幢菩薩等所從來國妙寶世界等其所事佛無盡幢佛等至佛所已頂禮佛足隨所來方各化寶座結跏趺坐各各身放百千億那由他阿僧祗光明普照十方無邊世界現大神變清淨莊嚴遍滿虗空等周法界如此世界兜率天宮諸菩薩衆來集於會如是十方一切世界兜率天宮悉亦如是爾時世尊從兩膝輪放百千億那由他光明普照十方盡法界虗空界一切世界彼諸菩薩皆見於此佛神變相此諸菩薩亦見於彼一切如來神變之相如是菩薩皆與如來於往昔時同種善根修菩薩行究竟到於大智彼岸爾時金剛幢菩薩普觀十方而説頌言如來不出世亦無有涅槃以本大願力示現自在法如是等十偈讚佛功德乃至十幢菩薩各以十偈讚佛如經自具共有百偈十回向品者表金剛幢菩薩承佛神力入菩薩智光三昧入是三昧已十方各過十萬佛剎微塵數世界外有十萬佛剎微塵數諸佛皆同一號名金剛幢咸稱讚言善哉佛子乃能入此三昧此是十方諸佛共加於汝而演説法令諸菩薩得清淨無畏故護持如來種性故演説諸菩薩十種回向故三世諸佛咸演説故何等為十一者救護一切衆生離衆生相回向二者不壞回向三者等一切諸佛回向四者至一切處回向五者無盡功德藏回向六者入一切平等善根回向七者隨順一切衆生回向八者真如相回向九者無縛無著解脫回向十者入法界無盡回向此十種回向三世諸佛已説當説今説一一回向之內條則大願廣多無數又有二百四十六首偈頌重敘此十種回向之內大願功德爾時佛神力故在會諸菩薩衆周遍十方咸作是言善哉金剛幢乃能説此十種諸大回向我等於十方界亦如是説文辭句義悉皆如是我等來集為汝作證時金剛幢菩薩承佛神力普觀十方而説頌言以上此兜率天宮説十回向法門第五會始終一周第六會他化天宮説十地法門品者表世尊在他化天王宮摩尼寶藏殿與諸菩薩衆悉於他方來集所有功德悉已修行而得圓滿於不可説劫説不能盡其名曰金剛藏菩薩而為上首承佛神力入菩薩大智慧光明三昧入三昧已即時十方過十億佛剎微塵數世界外有十億佛剎微塵數諸佛同名金剛藏而現其前作如是言善哉善哉金剛藏乃能入大智慧光明三昧此是十方諸佛共加於汝亦是毗盧遮那如來本願力故爾時十方諸佛即與十種智各伸右手摩金剛藏頂摩頂已金剛藏菩薩從三昧起普告一切菩薩衆言佛子諸菩薩願廣大如法界究竟如虗空盡未來際遍一切佛剎救護衆生為一切諸佛之所護念入過去未來現在諸佛智地佛子菩薩摩訶薩智地有十種三世諸佛已説當説今説我亦如是説何等為十一者歡喜地二者離垢地三者發光地四者𦦨慧地五者難勝地六者現前地七者遠行地八者不動地九者善慧地十者法雲地此十種地是菩薩向菩提最上道亦是清淨法光明門此十地法功行願力廣大難量不可為喻初地菩薩多作大國王二地多作閻浮提王三地多作轉輪聖王四地多作忉利天王五地多作夜摩天王六地多作兜率天王七地多作他化天王八地多作小千界主九地多作中千界主十地多作大千界主此十種地功用大願廣大無比又總有三百八十六首偈頌重敘十地之內功德大願如經自具七會菩提場中普光明殿説十定品者表世尊在摩竭國菩提場中始成正覺於普光明殿入剎那際三昧以一切智自在神通力現如來身清淨無礙住奢摩他最極寂靜具大威德與十佛剎微塵數菩薩俱靡不皆入灌頂之位獲諸菩薩普見三昧住於菩薩無住解脫其名曰金剛慧菩薩等於往昔時皆與毗盧遮那如來同修菩薩諸善根行時普眼菩薩白佛言世尊普賢菩薩住菩薩不思議廣大三昧或出或入一切三昧神通自在無有休息佛告普眼今此會中普賢菩薩當為汝説爾時普賢菩薩承佛神力在大衆中即時演説十大三昧令三世一切菩薩悉皆具足得大自在何等為十一者普光大三昧二者妙光大三昧三者次第遍往諸佛國土大三昧四者深心清淨行大三昧五者知過去莊嚴藏大三昧六者智光明藏大三昧七者了知一切世界佛莊嚴大三昧八者衆生差別身大三昧九者法界自在大三昧十者無礙輪大三昧此十大三昧諸大菩薩乃能善入去來現在一切諸佛已説若諸菩薩愛樂修習則得成就如是之人則名為佛則名如來亦名導師亦名大導師亦名一切智於此十大三昧普攝一切衆生悉令清淨以方便智示成佛道於此十大三昧功用威力如經自具十通品者表佛命普賢菩薩告諸菩薩有十種通何等為十一者善知他心智神通二者無礙天眼智神通三者知過去劫宿命智神通四者知盡未來際劫智神通五者無礙清淨天耳智神通六者住無體性無動作往一切佛剎智神通七者善分別一切言辭智神通八者無數色身智神通九者一切法智神通十者得知一切三世無礙智神通此十種神通功用廣大威神自在之力如經自具十忍品者表普賢菩薩告諸菩薩摩訶薩十種忍者若得此忍則得到於一切菩薩無礙忍地一切佛法無礙無盡何等為十所謂音聲忍順忍無生法忍如幻忍如𦦨忍如夢忍如響忍如影忍如空忍此十種忍三世諸佛皆説我今亦如是説乃至如第十如空忍菩薩成就此忍得無來身以無去故等又以三十四偈重敘此十忍中功行願力如經自具阿僧祗品者表佛以阿僧祗數次緒演至不可説不可説數盡之極令諸世間入佛所知數量之義一百洛叉為一俱胝洛叉之數此云為億俱胝之數此云為兆俱胝俱胝為一阿庾多阿庾多阿庾多為一那由他此云為一百兆如是十十倍倍加增加至一百二十種大數至不可説不可説又不可説不可説為一不可説轉其中名數如經自具此品為佛自説壽量品者表心王菩薩告諸菩薩言佛子此娑婆世界釋迦如來佛剎一劫於極樂世界阿彌陀佛剎為一日一夜極樂世